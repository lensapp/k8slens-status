  - name: app.k8slens.dev
    url: https://app.k8slens.dev/auth/realms/lensCloud/protocol/openid-connect/3p-cookies/step1.html
  - name: checkout.k8slens.dev
    url: https://checkout.k8slens.dev
    maxRedirects: 0
  - name: docs.k8slens.dev
    url: https://docs.k8slens.dev
  - name: downloads.k8slens.dev
    url: https://downloads.k8slens.dev/ide/latest.yml
  - name: eu.bored.k8slens.dev
