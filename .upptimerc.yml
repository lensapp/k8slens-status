# Change these first
owner: lensapp # Your GitHub organization or username, where this repository lives
repo: k8slens-status # The name of this repository

# LDS branding — recolor the interactive (Chart.js) response-time graphs on the
# history/incident pages to the LDS primary color. The main-page sparklines are
# pre-rendered PNGs and are recolored via CSS in assets/lds.css (a filtered layer).
graphBorderColor: "#3d90ce"
graphBackgroundColor: "rgba(61, 144, 206, 0.4)"

